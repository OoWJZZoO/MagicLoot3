# ====== MagicLoot3 主配置 ======
# 语言：zh（中文）/ en（英文）
language: zh

# ====== 生成概率 ======
chances:
  ruin: 30       # 遗迹生成概率（百分比，每个新区块触发一次判定）
  mobs: 40       # 怪物穿戴随机装备的概率（百分比）

# ====== 宝箱战利品数量 ======
chest:
  items:
    min: 2
    max: 9       # 每箱物品数量 2~9
  treasure-stack:
    min: 2
    max: 9       # 财宝堆叠数量
  slimefun-stack:
    min: 2
    max: 6       # 粘液科技物品堆叠数量

# ====== 装备生成时扣除的耐久百分比 ======
durability:
  min: 10         # 最低剩余耐久 10%
  max: 90         # 最高剩余耐久 90%，取随机值

# ====== 鉴定费用（XP 等级） ======
costs:
  RANDOM: 10
  COMMON: 2
  UNCOMMON: 5
  RARE: 10
  EPIC: 25
  LEGENDARY: 50

# ====== 启用的战利品类型 ======
enable:
  TREASURE: true
  TOOL: true
  SLIMEFUN: true
  BOOK: true
  POTION: true
  UNANALIZED: true

# ====== 世界白名单（仅这些世界会生成遗迹） ======
world-whitelist:
- world
- world_the_end

# ====== 刷怪笼生物池 ======
spawners:
- ZOMBIE
- SPIDER
- CAVE_SPIDER
- BLAZE
- SKELETON
- ENDERMAN
- ZOMBIFIED_PIGLIN
- WITCH
