# ====== MagicLoot3 主配置 ======
# 语言：zh（中文）/ en（英文）
language: zh

options:
  auto-update: true
  log: true

# ====== 生成概率 ======
chances:
  ruin: 30       # 遗迹生成概率（百分比，每个新区块触发一次判定）
  mobs: 40       # 怪物穿戴随机装备的概率（百分比）

# ====== 各类型战利品产出数量范围（每个宝箱） ======
items:
  min: 2
  max: 10     # 每个宝箱物品数量 2~10

slimefun:
  min: 2
  max: 6      # 宝箱中粘液科技物品数量 2~6

# ====== 鉴定费用（XP 等级） ======
costs:
  RANDOM: 10
  COMMON: 2
  UNCOMMON: 5
  RARE: 10
  EPIC: 25
  LEGENDARY: 50

# ====== 启用的战利品类型 ======
enable:
  TREASURE: true
  TOOL: true
  SLIMEFUN: true
  BOOK: true
  POTION: true
  UNANALIZED: true

# ====== 世界白名单（仅这些世界会生成遗迹） ======
world-whitelist:
- world
- world_the_end

# ====== 刷怪笼生物池 ======
spawners:
- ZOMBIE
- SPIDER
- CAVE_SPIDER
- BLAZE
- SKELETON
- ENDERMAN
- ZOMBIFIED_PIGLIN
- WITCH
