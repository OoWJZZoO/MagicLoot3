# ====== MagicLoot3 主配置 ======
# 语言：zh（中文）/ en（英文）
language: ${plugin.lang}

# ====== 生成概率 ======
chances:
  mobs: 15 # 怪物穿戴随机装备的概率（百分比，每个怪物独立判定）

# ====== 世界配置 ======
# 每个世界单独配置生成概率。只有在此处列出的世界才会生成遗迹。
# ruin-chance: 新区块生成遗迹的概率（百分比，0-100）
# building-chance: 遗迹中特殊建筑的概率（百分比，0-100，如迷失图书馆）
worlds:
  world:
    ruin-chance: 8
    building-chance: 12
  world_the_end:
    ruin-chance: 35
    building-chance: 5

# ====== 宝箱战利品数量 ======
chest:
  items:
    min: 3
    max: 11 # 每箱物品数量
  treasure-stack:
    min: 2
    max: 9 # 财宝堆叠数量
  slimefun-stack:
    min: 1
    max: 3 # 粘液科技物品堆叠数量

# ====== 装备生成时扣除的耐久百分比 ======
durability:
  min: 10 # 最低剩余耐久 10%
  max: 90 # 最高剩余耐久 90%

# ====== 鉴定费用（XP 等级） ======
costs:
  RANDOM: 10
  COMMON: 2
  UNCOMMON: 5
  RARE: 10
  EPIC: 25
  LEGENDARY: 50

# ====== 启用的战利品类型 ======
enable:
  TREASURE: true
  TOOL: true
  SLIMEFUN: true
  BOOK: true
  POTION: true
  UNANALIZED: true

# ====== 刷怪笼生物池 ======
spawners:
- ZOMBIE
- SPIDER
- CAVE_SPIDER
- VEX